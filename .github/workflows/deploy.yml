name: Deploy to Vercel
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: Deployment Mode
        type: choice
        options:
          - production
          - preview
        default: production

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dir: sngr.my.id
            projectId: VERCEL_PROJECT_ID_ROOT
          - dir: blog.sngr.my.id
            projectId: VERCEL_PROJECT_ID_BLOG
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[matrix.projectId] }}
      TURBO_TEAM: ${{ vars.TURBO_TOKEN}}
      TURBO_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      # caching
      - uses: actions/cache@v2
        if: matrix.dir == 'sngr.my.id'
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-next-
      - uses: actions/cache@v2
        if: matrix.dir == 'blog.sngr.my.id'
        with:
          path: ${{ github.workspace }}/node_modules/.astro
          key: ${{ runner.os }}-astro-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-astro-

      # installation
      - run: pnpm install --global vercel@latest
      - run: pnpm install --frozen-lockfile

      # run on preview
      - if: (github.event_name == 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'preview')
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - if: (github.event_name == 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'preview')
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - if: (github.event_name == 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'preview')
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      # run on production
      - if: (github.event_name != 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'production')
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - if: (github.event_name != 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'production')
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - if: (github.event_name != 'pull_request') || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'production')
        run: vercel deploy --prod --prebuilt --token=${{ secrets.VERCEL_TOKEN }}